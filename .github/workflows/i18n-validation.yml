name: i18n Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate i18n keys
        run: npm run validate:i18n
