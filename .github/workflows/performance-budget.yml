name: Performance budgets

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  budgets:
    runs-on: ubuntu-latest
    env:
      NUXT_SESSION_PASSWORD: ci-session-password-at-least-32-chars-long
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Check JS/CSS bundle budgets
        run: |
          mkdir -p .perf
          node scripts/check-bundle-budget.mjs --enforce --output .perf/head-bundle.json

      - name: Check LCP/TBT budgets (Lighthouse)
        run: pnpm dlx @lhci/cli@0.13.x autorun --config=perf/lighthouserc.json

      - name: Build and measure base branch (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git worktree add /tmp/base "${{ github.event.pull_request.base.sha }}"
          cd /tmp/base
          pnpm install --frozen-lockfile
          pnpm run build
          node scripts/check-bundle-budget.mjs --output /tmp/base-bundle.json

      - name: Create bundle diff report (PR only)
        if: github.event_name == 'pull_request'
        run: |
          node scripts/create-bundle-diff.mjs /tmp/base-bundle.json .perf/head-bundle.json .perf/bundle-diff.md

      - name: Publish bundle diff comment (PR only)
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: .perf/bundle-diff.md
          header: bundle-diff
